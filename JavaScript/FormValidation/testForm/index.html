<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Form</title>
</head>
<body>
  <form id="form">

    <fieldset id="personal-info">
      <div>
        <label for="full-name">Full Name:</label>
        <input type="text" id="full-name" name="full-name" placeholder="John Doe" required/>
      </div>

    <div>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="example@domain.com" pattern=".+\.com$"
 required/>
    </div>
    </fieldset>
    <hr>

    <div>
      <label for="text-area">Message:</label>
      <textarea id="text-area" name="message" placeholder="Enter your message here" minlength="10" required></textarea>
    </div>

    <div id="btn-container">
      <button type="submit" id="submit-btn">Submit</button>
      <span id="message-box" aria-live="polite"></span>
    </div>

  </form>
<script src="script.js"></script>
</body>
</html>
